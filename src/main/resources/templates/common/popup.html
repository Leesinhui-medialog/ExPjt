<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- 공통 레이어 팝업 fragment -->
<div th:fragment="popup">
    <div id="layerPopup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:#fff; border-radius:8px; padding:28px 32px 20px; min-width:300px; max-width:440px; box-shadow:0 4px 20px rgba(0,0,0,0.15); text-align:center;">
            <p id="popupMessage" style="font-size:0.95rem; color:#222; margin:0 0 20px; line-height:1.5;"></p>
            <div id="popupButtons" style="display:flex; gap:8px; justify-content:center;">
                <!-- 버튼은 JS에서 동적 생성 -->
            </div>
        </div>
    </div>
    <script>
        var LayerPopup = {
            _resolve: null,
            /**
             * alert 대체 - 확인 버튼만
             * @param {string} msg 메시지
             * @returns {Promise}
             */
            alert: function(msg) {
                return new Promise(function(resolve) {
                    LayerPopup._resolve = resolve;
                    document.getElementById('popupMessage').textContent = msg;
                    var btns = document.getElementById('popupButtons');
                    btns.innerHTML = '<button onclick="LayerPopup._close(true)" style="padding:8px 28px;background:#4a7cff;color:#fff;border:none;border-radius:4px;font-size:0.9rem;cursor:pointer;">확인</button>';
                    document.getElementById('layerPopup').style.display = 'flex';
                });
            },
            /**
             * confirm 대체 - 확인/취소 버튼
             * @param {string} msg 메시지
             * @returns {Promise<boolean>}
             */
            confirm: function(msg) {
                return new Promise(function(resolve) {
                    LayerPopup._resolve = resolve;
                    document.getElementById('popupMessage').textContent = msg;
                    var btns = document.getElementById('popupButtons');
                    btns.innerHTML =
                        '<button onclick="LayerPopup._close(true)" style="padding:8px 28px;background:#4a7cff;color:#fff;border:none;border-radius:4px;font-size:0.9rem;cursor:pointer;">확인</button>' +
                        '<button onclick="LayerPopup._close(false)" style="padding:8px 28px;background:#f0f0f0;color:#555;border:none;border-radius:4px;font-size:0.9rem;cursor:pointer;">취소</button>';
                    document.getElementById('layerPopup').style.display = 'flex';
                });
            },
            _close: function(result) {
                document.getElementById('layerPopup').style.display = 'none';
                if (LayerPopup._resolve) {
                    LayerPopup._resolve(result);
                    LayerPopup._resolve = null;
                }
            }
        };
    </script>
</div>
</html>
